# Traefik static configuration
api:
  dashboard: true
  insecure: true # Enable dashboard without auth for local dev

entryPoints:
  web:
    address: ":80"
    # Redirect HTTP to HTTPS
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false # Only services with traefik.enable=true
    watch: true # Auto-discover new containers

  file:
    filename: /etc/traefik/certificates.yml
    watch: true

log:
  level: INFO
